services:
  redis:
    image: redis:latest
    container_name: dcs-redis
    ports:
      - "6379:6379"
    networks:
      - dcs-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: dcs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_1234      # 루트 계정 비밀번호
      MYSQL_DATABASE: dcs_db                   # 애플리케이션에서 사용할 DB 이름
      MYSQL_USER: dcs_user                     # 애플리케이션용 계정
      MYSQL_PASSWORD: dcs_user_pass_1234       # 애플리케이션용 계정 비밀번호
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    networks:
      - dcs-network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  local-dcs:
    image: local-dcs-server:latest
    container_name: dcs-server
    ports:
      - "8093:8093"
    networks:
      - dcs-network
    environment:
      DB_HOST: mysql
      DB_SCHEMA: dcs_db
      DB_USER: dcs_user
      DB_PASSWORD: dcs_user_pass_1234
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: unless-stopped

    labels:
      - "autoheal=true"

    # ↓↓↓ /actuator/health 기반 헬스체크
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8093/actuator/health || exit 1"]
      interval: 10s        # 10초마다 체크
      timeout: 3s          # 3초 안에 응답 없으면 실패
      retries: 3           # 3번 연속 실패하면 unhealthy
      start_period: 30s    # 컨테이너 시작 후 30초 동안은 준비시간으로 보고 실패 무시

  # ↓↓↓ autoheal 컨테이너
  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dcs-network

networks:
  dcs-network:
    driver: bridge

version: "3.8"

services:
  backend:
    container_name: devnogi-community-server
    image: ${DOCKERHUB_USERNAME}/devnogi-community-server:latest # 배포 서버 이미지 (devnogi-community-server)
    ports:
      - "${SERVICE_PORT:-8093}:8093"
    environment:
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m
      - SPRING_PROFILES_ACTIVE=prod

      - DB_HOST=devnogi-mysql
      - DB_PORT=${DB_PORT}
      - DB_SCHEMA=${DB_SCHEMA}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}

      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY} #ID
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY} #PASSWORD

      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - TZ=Asia/Seoul

    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  # 2. 데이터베이스
  database:
    image: mysql:8.0.42
    container_name: devnogi-db
    environment:
      MYSQL_DATABASE: ${DB_SCHEMA}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db_data:/var/lib/mysql
    restart: always
    networks:
      - app-network
    healthcheck:
      test: "mysqladmin ping -h localhost -u root -p${DB_PASSWORD}"
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Redis
  redis:
    image: redis:8.4.0
    container_name: devnogi-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis_data:/data
    restart: always
    networks:
      - app-network
    healthcheck:
      test: "redis-cli -a ${REDIS_PASSWORD} ping"
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

networks:
  app-network:
    driver: bridge

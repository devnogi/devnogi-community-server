version: '3.8'

services:
  backend:
    container_name: devnogi-community-server
    image: ${DOCKERHUB_USERNAME}/dcs-server:latest # 개발 서버 이미지 (dcs-server)
    ports:
      - "80:8093"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_SCHEMA=${DB_SCHEMA}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}

      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    networks:
      - dcs-network
    labels:
      - "autoheal=true"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8093/actuator/health || exit 1" ]
      interval: 10s        # 10초마다 체크
      timeout: 3s          # 3초 안에 응답 없으면 실패
      retries: 3           # 3번 연속 실패하면 unhealthy
      start_period: 30s    # 컨테이너 시작 후 30초 동안은 준비시간으로 보고 실패 무시

  redis:
    image: redis:latest
    container_name: devnogi-community-redis
    command: sh -c "redis-server --requirepass $${REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - dcs-network
    restart: unless-stopped
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: minio-local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - dcs-network

  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dcs-network

networks:
  dcs-network:
    driver: bridge

volumes:
  redis_data:
  minio_data:

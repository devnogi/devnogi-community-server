server:
  port: 8093
  address: 0.0.0.0
  shutdown: graceful
  error:
    whitelabel:
      enabled: false
  tomcat:
    mbeanregistry:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: [ "health" ]
  health:
    db:
      enabled: false
    redis:
      enabled: false

spring:
  application:
    name: devnogi-community-server
  web:
    resources:
      static-locations: classpath:/static/
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT}/${DB_SCHEMA}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100
  #    show-sql: true
  flyway:
    enabled: true
    encoding: UTF-8
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  mvc:
    contentnegotiation:
      # URL 확장자에 의한 컨텐트 타입 결정
      favor-path-extension: true
      # Accept 헤더 무시
      ignore-accept-header: true
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

jwt:
  secret-key: ${JWT_SECRET_KEY:e4f1a5c8d2b7e9f0a6c3d1b8e5f2c7a9d4e6f3b1a2c8d5e9f0b3a7c2d1e8f5a4}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:3600} # seconds (1 hour)
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:86400} # seconds (1 day)

springdoc:
  swagger-ui:
    persist-authorization: true
    operations-sorter: alpha
    tags-sorter: alpha
    disable-swagger-default-url: true
    display-request-duration: true
    classification:
      readyToUseGroupName: 개발 완료 API
      workInProgressGroupName: 개발 진행중 API
      deprecatedGroupName: 더이상 유지보수되지 않는 API

decorator:
  datasource:
    p6spy:
      enable-logging: false

app:
  notification:
    stream: notif-stream
    group: notif-workers
    pollTimeoutSec: 30        # 블로킹 대기 시간 (롱폴링)
    maxLen: 100000            # 스트림 길이

---
spring:
  config:
    activate:
      on-profile: default

decorator:
  datasource:
    p6spy:
      enable-logging: true

logging:
  level:
    until.the.eternity: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

springdoc:
  swagger-ui:
    enabled: false

#로컬용 설정
minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: dcs-local-bucket


# 환경별 redis 설정 분리
---
spring:
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

---
spring:
  config:
    activate:
      on-profile: docker  # 전체를 Docker로 실행할 때
  data:
    redis:
      host: devnogi-community-redis
      port: 6379

---
spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: true


name: deploy-with-docker-prod.yml

on:
  push:
    branches:
      - [ "main", "chore/generate-ci/cd-pipeline" ]
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: devnogi-community-server
  DOCKER_TAG: latest
  COMPOSE_SERVICE_NAME: backend


jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # мәҗмӢұ м—¬л¶Җм—җ лҢҖн•ҙ кі лҜј н•ҙлҙҗм•јкІ лӢӨ.
      - name: Cache Gradle wrapper & dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # н…ҢмҠӨнҠёлҠ” CIм—җм„ң н–ҲмңјлҜҖлЎң мғқлһө(-x test)
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build (Gradle) & Docker build/tag
        run: |
          ./gradlew clean build -x test
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devnogi-community-server:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/devnogi-community-server:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/devnogi-community-server:latest

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devnogi-community-server:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devnogi-community-server:latest


  deploy:
    needs: build-and-push # л№Ңл“ңк°Җ м„ұкіөн•ҙм•јл§Ң мӢӨн–ү
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on prod server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: COMPOSE_SERVICE_NAME
          script: |
            cd devnogi-community
            
            # [мӨ‘мҡ”] docker-compose.prod.ymlм—җм„ң мӮ¬мҡ©н•ҳлҠ” ліҖмҲҳл“Өмқ„ .env.prodм—җ кё°лЎқ
            # 1. Compose нҢҢмқј лӮҙ image: ${DOCKERHUB_USERNAME}/... л¶Җл¶„ лҢҖмқ‘
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env.prod
            
            # 2. нҸ¬нҠё л°Ҹ DB м •ліҙ
            echo "SERVICE_PORT=${{ secrets.SERVICE_PORT }}" >> .env.prod
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env.prod
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env.prod
            echo "DB_SCHEMA=${{ secrets.DB_SCHEMA }}" >> .env.prod
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env.prod
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.prod
            
            # 3. Redis & JWT
            echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env.prod
            echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env.prod
            echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env.prod
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env.prod
            
            # 4. лҸ„м»Ө лЎңк·ёмқё
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # 5. Docker ComposeлЎң л°°нҸ¬ мӢӨн–ү
            # Compose нҢҢмқјмқҙ ліҖмҲҳ(${DOCKERHUB_USERNAME} л“ұ)лҘј .env.prodм—җм„ң мқҪм–ҙмҳҙ
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull ${{ env.COMPOSE_SERVICE_NAME }}
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d ${{ env.COMPOSE_SERVICE_NAME }} --remove-orphans
            
            # 6. м •лҰ¬
            docker image prune -f
            docker compose -f docker-compose.prod.yml ps